<footer class="site-footer">
  <div class="site-footer-inner">
    <span>{{ site.description | escape }}</span>
    <span class="footer-links">
      <a href="https://github.com/{{ site.github_username | escape }}">GitHub</a>
      <a href="https://www.twitter.com/{{ site.twitter_username | escape }}">Twitter</a>
      <a href="mailto:{{ site.email | escape }}">Email</a>
    </span>
  </div>
</footer>
